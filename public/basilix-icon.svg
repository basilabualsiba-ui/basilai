<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"    style="stop-color:#10b981"/>
      <stop offset="16%"   style="stop-color:#ef4444"/>
      <stop offset="32%"   style="stop-color:#ec4899"/>
      <stop offset="48%"   style="stop-color:#8b5cf6"/>
      <stop offset="64%"   style="stop-color:#06b6d4"/>
      <stop offset="80%"   style="stop-color:#eab308"/>
      <stop offset="100%"  style="stop-color:#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Glow text -->
  <text x="256" y="300" text-anchor="middle" font-family="system-ui, -apple-system, Arial Black, sans-serif"
        font-weight="900" font-size="108" letter-spacing="8"
        fill="url(#grad)" opacity="0.5" filter="url(#glow)">BSLX</text>
  <!-- Main text -->
  <text x="256" y="300" text-anchor="middle" font-family="system-ui, -apple-system, Arial Black, sans-serif"
        font-weight="900" font-size="108" letter-spacing="8"
        fill="url(#grad)">BSLX</text>
  <!-- Subtitle -->
  <text x="256" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-weight="400" font-size="32" letter-spacing="16"
        fill="url(#grad)" opacity="0.7">BASILIX</text>
</svg>
